<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>华足辅助工具 - 主菜单</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <h1 style="margin-bottom: 20px;">系统主菜单</h1>
    <h2 id="welcome-text" style="color: #1976d2; font-weight: normal; margin-bottom: 40px;"></h2>
    
    <div style="margin-bottom: 30px;">
        <button class="main-btn" onclick="window.location.href='package.html'">抽培养包</button>
        
        <button class="main-btn" onclick="window.location.href='draw.html'">抽外籍</button>
    </div>
    
    <button class="small-btn btn-no" onclick="logout()">退出登录</button>

    <script src="js/auth.js"></script>
    <script>
        // 页面加载时检查是否已登录
        window.onload = () => {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                alert("未登录或登录已过期，请重新登录！");
                window.location.href = 'index.html';
            } else {
                document.getElementById('welcome-text').innerText = `欢迎回来，${user}！`;
            }
        };
    </script>
</body>
</html>
