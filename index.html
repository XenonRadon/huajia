<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>华足辅助工具 - 登录</title>
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="login-section">
        <h1 style="margin-bottom: 40px;">欢迎使用华足辅助工具</h1>
        <input type="text" id="username-input" class="input-box" placeholder="请输入您的用户名" onkeydown="checkEnter(event)"><br>
        <input type="password" id="password-input" class="input-box" placeholder="密码 (未设置则留空)" onkeydown="checkEnter(event)"><br>
        <button class="main-btn" id="login-btn" onclick="login()">登 录</button>
        <div id="system-status">准备就绪</div>
    </div>

    <script src="js/supabase-init.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
