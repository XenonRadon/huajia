<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>华足辅助工具</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { text-align: center; font-family: sans-serif; margin-top: 10vh; }
        h1 { color: #333; }
        #result { font-size: 64px; font-weight: bold; margin: 30px; color: #d32f2f; }
        
        .main-btn { font-size: 24px; padding: 12px 40px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background-color: #f9f9f9; display: inline-block; margin: 0 10px; }
        .main-btn:hover { background-color: #e0e0e0; }
        .main-btn:disabled { background-color: #eee; color: #aaa; cursor: not-allowed; }
        
        /* 扩展功能按钮特定样式 */
        .btn-ext { background-color: #e3f2fd; border-color: #90caf9; color: #1565c0; }
        .btn-ext:hover { background-color: #bbdefb; }

        .small-btn { font-size: 16px; padding: 6px 15px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background-color: #eee; vertical-align: middle; margin-left: 15px; }
        .small-btn:hover { background-color: #ddd; }
        .btn-warning { background-color: #ffeb3b; border-color: #fbc02d; }
        .btn-warning:hover { background-color: #fdd835; }

        #login-section { margin-top: 15vh; }
        .input-box { font-size: 20px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 20px; width: 250px; text-align: center; }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); justify-content: center; align-items: center;
        }
        .modal-box {
            background: white; padding: 30px 50px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; min-width: 300px;
        }
        .modal-box p { font-size: 24px; margin-top: 0; margin-bottom: 25px; }
        .modal-btn { font-size: 18px; padding: 8px 30px; margin: 0 15px; cursor: pointer; border-radius: 6px; border: none; }
        .btn-yes { background-color: #4CAF50; color: white; }
        .btn-yes:hover { background-color: #45a049; }
        .btn-no { background-color: #f44336; color: white; }
        .btn-no:hover { background-color: #da190b; }

        /* BAN状态展示区 */
        #ban-display-area { margin-top: 25px; font-size: 18px; font-weight: bold; }
        .ban-item { display: inline-block; margin: 5px 15px; padding: 8px 15px; background-color: #ffebee; color: #c62828; border-radius: 8px; border: 1px solid #ffcdd2; }

        #ban-position-display { background-color: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        
        /* 一次抽两个提示框 */
        #ban-double-display { background-color: #fff3e0; color: #ef6c00; border-color: #ffe0b2; }

        /* 费用锁定提示框 */
        #ban-cost-display { background-color: #e3f2fd; color: #1565c0; border-color: #90caf9; }

        #history-container {
            margin-top: 40px; padding: 20px; width: 80%;
            margin-left: auto; margin-right: auto; border-top: 1px dashed #ccc;
        }
        #history-title { font-size: 16px; color: #666; margin-bottom: 15px; }
        
        .history-row { font-size: 22px; margin-bottom: 12px; line-height: 1.6; }
        .history-user { font-weight: bold; color: #333; }
        .history-item { margin: 0 5px; font-weight: bold; }
        .history-gray { color: #a0a0a0; }
        .history-black { color: #000000; }
        
        #system-status { color: #888; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-section">
        <h1 style="margin-bottom: 40px;">欢迎使用抽签系统</h1>
        <input type="text" id="username-input" class="input-box" placeholder="请输入您的用户名" onkeydown="checkEnter(event)"><br>
        <input type="password" id="password-input" class="input-box" placeholder="密码 (未设置则留空)" onkeydown="checkEnter(event)"><br>
        <button class="main-btn" id="login-btn" onclick="login()">登 录</button>
        <div id="system-status">正在连接数据库...</div>
    </div>

    <div id="draw-section" style="display: none;">
        <h1>抽外籍 
            <span id="current-user-display" style="font-size: 20px; color: #1976d2; font-weight: normal; margin-left: 10px;"></span> 
            <button class="small-btn" onclick="logout()">切换用户</button>
            <button class="small-btn btn-warning" id="set-pwd-btn" style="display: none;" onclick="showPwdModal()">设置密码</button>
        </h1>
        
        <div id="result">等待中...</div>
        
        <div style="position: relative; display: inline-block;">
            <button class="main-btn" id="draw-btn" onclick="showDrawModal()">抽！</button>
            <button class="main-btn btn-ext" id="ext-btn" onclick="showExtModal()" style="position: absolute; left: 100%; top: 50%; transform: translateY(-50%); margin-left: 20px; white-space: nowrap;">扩展功能</button>
        </div>

        <div id="ban-display-area">
            <div id="ban-style-display" class="ban-item" style="display: none;">
                已BAN风格：<span id="ban-style-text"></span>
                <button class="small-btn" style="padding: 2px 8px; margin-left: 10px; font-size: 14px;" onclick="clearBan('style')">取消</button>
            </div>
            <div id="ban-position-display" class="ban-item" style="display: none;">
                已BAN注册：<span id="ban-position-text"></span>
                <button class="small-btn" style="padding: 2px 8px; margin-left: 10px; font-size: 14px;" onclick="clearBan('position')">取消</button>
            </div>
            <div id="ban-double-display" class="ban-item" style="display: none;">
                已开启：一次抽两个
                <button class="small-btn" id="btn-clear-double" style="padding: 2px 8px; margin-left: 10px; font-size: 14px;" onclick="clearBan('double')">取消</button>
            </div>
            <div id="ban-cost-display" class="ban-item" style="display: none;">
                <span id="ban-cost-text"></span>
                <button class="small-btn" id="btn-clear-cost" style="padding: 2px 8px; margin-left: 10px; font-size: 14px;" onclick="clearBan('cost')">取消</button>
            </div>
        </div>

        <div id="history-container">
            <div id="history-title">已抽记录（每人生效的为黑色，已放弃的为灰色）：</div>
            <div id="history-list">加载中...</div>
        </div>
    </div>

    <div id="draw-modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <p id="draw-modal-text">是否确认重抽？</p>
            <button class="modal-btn btn-yes" onclick="confirmDraw()">是</button>
            <button class="modal-btn btn-no" onclick="hideDrawModal()">否</button>
        </div>
    </div>

    <div id="ext-modal-overlay" class="modal-overlay">
        <div class="modal-box" style="text-align: left;">
            <p style="text-align: center;">扩展功能</p>
            <div style="margin-bottom: 20px; font-size: 18px;">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="chk-ban-style" onchange="toggleBanInput('style')" style="width: 18px; height: 18px; vertical-align: middle;"> 
                    <span style="vertical-align: middle;">BAN风格</span>
                </label>
                <select id="input-ban-style" class="input-box" style="width: 160px; display: none; margin: 0 0 0 15px; padding: 5px; font-size: 16px; vertical-align: middle;">
                    <option value="" disabled selected>请选择风格</option>
                    <option value="无风格">无风格</option>
                    <option value="目标中锋">目标中锋</option>
                    <option value="偷猎者">偷猎者</option>
                    <option value="禁区之狐">禁区之狐</option>
                    <option value="虚假跑位">虚假跑位</option>
                    <option value="影子前锋">影子前锋</option>
                    <option value="高产翼锋">高产翼锋</option>
                    <option value="自由侧翼">自由侧翼</option>
                    <option value="创意指挥官">创意指挥官</option>
                    <option value="传统10号位置">传统10号位置</option>
                    <option value="传中专家">传中专家</option>
                    <option value="全能中场">全能中场</option>
                    <option value="指挥官">指挥官</option>
                    <option value="破坏型中场">破坏型中场</option>
                    <option value="靠山">靠山</option>
                    <option value="迭瓦式终结者">迭瓦式终结者</option>
                    <option value="进攻型后卫">进攻型后卫</option>
                    <option value="防守型后卫">防守型后卫</option>
                    <option value="额外前锋">额外前锋</option>
                    <option value="建立">建立</option>
                    <option value="进攻型守门员">进攻型守门员</option>
                    <option value="防守型守门员">防守型守门员</option>
                </select>
            </div>
            <div style="margin-bottom: 20px; font-size: 18px;">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="chk-ban-position" onchange="toggleBanInput('position')" style="width: 18px; height: 18px; vertical-align: middle;"> 
                    <span style="vertical-align: middle;">BAN注册</span>
                </label>
                <select id="input-ban-position" class="input-box" style="width: 160px; display: none; margin: 0 0 0 15px; padding: 5px; font-size: 16px; vertical-align: middle;">
                    <option value="" disabled selected>请选择位置</option>
                    <option value="CF">CF</option>
                    <option value="SS">SS</option>
                    <option value="LF">LF</option>
                    <option value="RF">RF</option>
                    <option value="AM">AM</option>
                    <option value="LM">LM</option>
                    <option value="RM">RM</option>
                    <option value="CM">CM</option>
                    <option value="DM">DM</option>
                    <option value="LB">LB</option>
                    <option value="RB">RB</option>
                    <option value="CB">CB</option>
                    <option value="GK">GK</option>
                </select>
            </div>
            
            <div style="margin-bottom: 20px; font-size: 18px;">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="chk-ban-double" style="width: 18px; height: 18px; vertical-align: middle;"> 
                    <span style="vertical-align: middle;">一次抽两个</span>
                </label>
            </div>

            <div style="margin-bottom: 30px; font-size: 18px;">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="chk-ban-cost" onchange="toggleBanInput('cost')" style="width: 18px; height: 18px; vertical-align: middle;"> 
                    <span style="vertical-align: middle;">X费之前免费</span>
                </label>
                <select id="input-ban-cost" class="input-box" style="width: 160px; display: none; margin: 0 0 0 15px; padding: 5px; font-size: 16px; vertical-align: middle;">
                    <option value="" disabled selected>请选择费用</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div style="text-align: center;">
                <button class="modal-btn btn-yes" onclick="saveExtFeatures()">确定</button>
                <button class="modal-btn btn-no" onclick="hideExtModal()">取消</button>
            </div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <p>请设置您的专属密码</p>
            <input type="password" id="new-password-input" class="input-box" style="width: 80%;" placeholder="请输入新密码">
            <br>
            <button class="modal-btn btn-yes" id="save-pwd-btn" onclick="confirmSetPwd()">保存</button>
            <button class="modal-btn btn-no" onclick="hidePwdModal()">取消</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. Supabase 项目配置
        // ==========================================
        const SUPABASE_URL = 'https://rqpqgpckotosjuiiqkit.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_iWPs_iamFCLEaDAOpmkLyw_eIXf7YBx';
        
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. 状态管理配置
        // ==========================================
        let options = []; 
        let currentUser = "";
        let historyRecords = [];
        let hasPassword = false;
        
        let userBanStatusMap = {}; 

        // 扩展功能状态
        let activeBanStyle = "";
        let activeBanPosition = "";
        let activeFreeCost = "";
        let activeDoubleDraw = false;

        window.onload = async () => {
            document.getElementById("system-status").innerText = "正在加载数据库信息...";
            await fetchOptions(); 
            await fetchUserBanStatus(); 
            await fetchHistory();
            setupRealtime(); 
            document.getElementById("system-status").innerText = "数据库连接成功，可以登录。";
        };

        // ==========================================
        // 3. 数据库交互与实时监听
        // ==========================================
        
        async function fetchOptions() {
            const { data, error } = await supabaseClient
                .from('characters_pool') 
                .select('num, name, fengge, position, cost'); 

            if (error) {
                console.error("读取抽签选项失败:", error);
                document.getElementById("system-status").innerText = "读取选项配置失败，请检查数据库。";
                return;
            }
            
            options = data || [];
        }

        async function fetchUserBanStatus() {
            const { data, error } = await supabaseClient
                .from('user_ban_status')
                .select('*');
            if (!error && data) {
                userBanStatusMap = {};
                data.forEach(row => {
                    userBanStatusMap[row.username] = {
                        style: row.used_ban_style,
                        position: row.used_ban_position,
                        freeCost: row.used_free_cost,
                        doubleDraw: row.used_double_draw 
                    };
                });
            } else if (error) {
                console.error("读取用户BAN状态失败:", error);
            }
        }

        async function fetchHistory() {
            const { data, error } = await supabaseClient
                .from('draw_history')
                .select('*')
                .order('created_at', { ascending: true }); 

            if (error) {
                console.error("读取数据失败:", error);
                document.getElementById("system-status").innerText = "数据库连接失败，请检查配置。";
                return;
            }

            historyRecords = data.map(row => ({
                user: row.username,
                draw: row.draw_name
            }));
            renderHistory();
        }

        function setupRealtime() {
            supabaseClient
                .channel('public:draw_history')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'draw_history' }, async payload => {
                    const newRecord = payload.new;
                    historyRecords.push({ user: newRecord.username, draw: newRecord.draw_name });
                    await fetchUserBanStatus(); 
                    renderHistory();
                })
                .subscribe();
        }

        // ==========================================
        // 4. 扩展功能逻辑 (BAN风格 / BAN注册 / 免费费用 / 一次抽两个)
        // ==========================================
        function showExtModal() {
            // BAN风格
            document.getElementById("chk-ban-style").checked = !!activeBanStyle;
            document.getElementById("input-ban-style").value = activeBanStyle || "";
            toggleBanInput('style');

            // BAN注册
            document.getElementById("chk-ban-position").checked = !!activeBanPosition;
            document.getElementById("input-ban-position").value = activeBanPosition || "";
            toggleBanInput('position');

            // 一次抽两个（自由取消）
            document.getElementById("chk-ban-double").checked = activeDoubleDraw;
            document.getElementById("chk-ban-double").disabled = false;

            // X费之前免费（处理数据库已锁定的情况）
            const lockedCost = userBanStatusMap[currentUser] && userBanStatusMap[currentUser].freeCost;
            if (lockedCost) {
                document.getElementById("chk-ban-cost").checked = true;
                document.getElementById("chk-ban-cost").disabled = true; 
                document.getElementById("input-ban-cost").value = lockedCost;
                document.getElementById("input-ban-cost").disabled = true; 
                document.getElementById("input-ban-cost").style.display = "inline-block";
            } else {
                document.getElementById("chk-ban-cost").disabled = false;
                document.getElementById("chk-ban-cost").checked = !!activeFreeCost;
                document.getElementById("input-ban-cost").disabled = false;
                document.getElementById("input-ban-cost").value = activeFreeCost || "";
                toggleBanInput('cost');
            }

            document.getElementById("ext-modal-overlay").style.display = "flex";
        }

        function hideExtModal() {
            document.getElementById("ext-modal-overlay").style.display = "none";
        }

        function toggleBanInput(type) {
            const isChecked = document.getElementById(`chk-ban-${type}`).checked;
            document.getElementById(`input-ban-${type}`).style.display = isChecked ? "inline-block" : "none";
        }

        function saveExtFeatures() {
            const isBanStyleChecked = document.getElementById("chk-ban-style").checked;
            const isBanPositionChecked = document.getElementById("chk-ban-position").checked;
            const isBanDoubleChecked = document.getElementById("chk-ban-double").checked;
            const isBanCostChecked = document.getElementById("chk-ban-cost").checked;

            const styleVal = document.getElementById("input-ban-style").value.trim();
            const posVal = document.getElementById("input-ban-position").value.trim();
            const costVal = document.getElementById("input-ban-cost").value.trim();

            if (isBanStyleChecked && !styleVal) {
                alert("请在下拉框中选择要BAN的风格！");
                return;
            }
            if (isBanPositionChecked && !posVal) {
                alert("请在下拉框中选择要BAN的注册位置！");
                return;
            }
            
            const isCostLocked = userBanStatusMap[currentUser] && userBanStatusMap[currentUser].freeCost;
            if (isBanCostChecked && !costVal && !isCostLocked) {
                alert("请在下拉框中选择免费的费用！");
                return;
            }

            activeBanStyle = isBanStyleChecked ? styleVal : "";
            activeBanPosition = isBanPositionChecked ? posVal : "";
            activeDoubleDraw = isBanDoubleChecked;

            if (!isCostLocked) {
                activeFreeCost = isBanCostChecked ? costVal : "";
            }

            updateBanDisplay();
            hideExtModal();
        }

        function clearBan(type) {
            if (type === 'style') activeBanStyle = "";
            if (type === 'position') activeBanPosition = "";
            if (type === 'double') activeDoubleDraw = false;
            if (type === 'cost') activeFreeCost = "";
            updateBanDisplay();
        }

        function updateBanDisplay() {
            const styleDisplay = document.getElementById("ban-style-display");
            const positionDisplay = document.getElementById("ban-position-display");
            const doubleDisplay = document.getElementById("ban-double-display");
            const costDisplay = document.getElementById("ban-cost-display"); 

            if (activeBanStyle) {
                document.getElementById("ban-style-text").innerText = activeBanStyle;
                styleDisplay.style.display = "inline-block";
            } else {
                styleDisplay.style.display = "none";
            }

            if (activeBanPosition) {
                document.getElementById("ban-position-text").innerText = activeBanPosition;
                positionDisplay.style.display = "inline-block";
            } else {
                positionDisplay.style.display = "none";
            }

            // 一次抽两个（自由取消）
            if (activeDoubleDraw) {
                doubleDisplay.style.display = "inline-block";
                document.getElementById("btn-clear-double").style.display = "inline-block";
            } else {
                doubleDisplay.style.display = "none";
            }

            // 处理费用锁定的显示
            const lockedCost = userBanStatusMap[currentUser] && userBanStatusMap[currentUser].freeCost;
            const displayCost = lockedCost || activeFreeCost;

            if (displayCost) {
                document.getElementById("ban-cost-text").innerText = `${displayCost}费之前免费`;
                costDisplay.style.display = "inline-block";
                document.getElementById("btn-clear-cost").style.display = lockedCost ? "none" : "inline-block";
            } else {
                costDisplay.style.display = "none";
            }
        }

        // ==========================================
        // 5. 登录与密码逻辑 
        // ==========================================
        async function login() {
            const inputUser = document.getElementById("username-input").value.trim();
            const inputPwd = document.getElementById("password-input").value.trim();
            
            if (!inputUser) {
                alert("用户名不能为空，请输入您的用户名！");
                return;
            }

            const loginBtn = document.getElementById("login-btn");
            const statusDiv = document.getElementById("system-status");
            
            loginBtn.disabled = true;
            statusDiv.innerText = "正在验证登录信息...";

            const { data, error } = await supabaseClient
                .from('user_passwords')
                .select('password')
                .eq('username', inputUser)
                .maybeSingle();

            loginBtn.disabled = false;
            statusDiv.innerText = "";

            if (error) {
                console.error("验证密码失败:", error);
                alert("网络错误或密码表未配置，请稍后重试！");
                return;
            }

            if (data) {
                if (data.password !== inputPwd) {
                    alert("密码错误，请重新输入！");
                    return;
                }
                hasPassword = true;
            } else {
                hasPassword = false;
            }

            currentUser = inputUser;
            document.getElementById("login-section").style.display = "none";
            document.getElementById("draw-section").style.display = "block";
            
            document.getElementById("current-user-display").innerText = `(当前操作人: ${currentUser})`;
            document.getElementById("result").innerText = "等待中...";

            document.getElementById("set-pwd-btn").style.display = hasPassword ? "none" : "inline-block";

            updateBanDisplay();
        }

        function logout() {
            document.getElementById("login-section").style.display = "block";
            document.getElementById("draw-section").style.display = "none";
            document.getElementById("username-input").value = ""; 
            document.getElementById("password-input").value = ""; 
            currentUser = "";
            hasPassword = false;
            clearBan('style');
            clearBan('position');
            clearBan('double');
            clearBan('cost'); 
        }

        function checkEnter(event) {
            if (event.key === "Enter") {
                login();
            }
        }

        function showPwdModal() {
            document.getElementById("new-password-input").value = "";
            document.getElementById("pwd-modal-overlay").style.display = "flex";
        }

        function hidePwdModal() {
            document.getElementById("pwd-modal-overlay").style.display = "none";
        }

        async function confirmSetPwd() {
            const newPwd = document.getElementById("new-password-input").value.trim();
            if (!newPwd) {
                alert("密码不能为空！");
                return;
            }

            const saveBtn = document.getElementById("save-pwd-btn");
            saveBtn.disabled = true;
            saveBtn.innerText = "保存中...";

            const { error } = await supabaseClient
                .from('user_passwords')
                .insert([{ username: currentUser, password: newPwd }]);

            saveBtn.disabled = false;
            saveBtn.innerText = "保存";

            if (error) {
                console.error("保存密码失败:", error);
                alert("保存密码失败，可能是网络问题。");
                return;
            }

            alert("密码设置成功！下次登录需使用该密码。");
            hasPassword = true;
            hidePwdModal();
            document.getElementById("set-pwd-btn").style.display = "none";
        }

        // ==========================================
        // 6. 抽签核心逻辑
        // ==========================================
        function showDrawModal() {
            if (options.length === 0) {
                alert("抽签选项池为空，请检查数据库配置！");
                return;
            }

            const hasCurrentUserDrawn = historyRecords.some(record => record.user === currentUser);
            const modalText = hasCurrentUserDrawn ? "是否确认重抽？" : "是否确认开始抽签？";
            
            document.getElementById("draw-modal-text").innerText = modalText;
            document.getElementById("draw-modal-overlay").style.display = "flex";
        }

        function hideDrawModal() {
            document.getElementById("draw-modal-overlay").style.display = "none";
        }

        async function confirmDraw() {
            hideDrawModal();
            
            const drawBtn = document.getElementById("draw-btn");
            drawBtn.disabled = true;
            document.getElementById("result").innerText = "抽取中...";

            const latestDrawsMap = {};
            historyRecords.forEach(record => {
                // 对于别人抽取的包含“&”的记录，我们也需要把它拆分开，使得这两个人都变成不可选
                const names = record.draw.split('&');
                if (!latestDrawsMap[record.user]) {
                    latestDrawsMap[record.user] = [];
                }
                latestDrawsMap[record.user] = names; 
            });

            const unavailableOptions = [];
            for (const user in latestDrawsMap) {
                if (user !== currentUser) { 
                    unavailableOptions.push(...latestDrawsMap[user]);
                }
            }

            let availableOptions = options.filter(opt => !unavailableOptions.includes(opt.name));

            if (activeBanStyle) {
                availableOptions = availableOptions.filter(opt => opt.fengge !== activeBanStyle);
            }
            if (activeBanPosition) {
                availableOptions = availableOptions.filter(opt => opt.position !== activeBanPosition);
            }

            let drawnName = "";
            const currentStatus = userBanStatusMap[currentUser] || { style: false, position: false, doubleDraw: false, freeCost: null };
            
            // 是否使用抽双重功能：仅取决于当前的UI勾选状态，不强制锁定
            const isUsingDoubleDraw = activeDoubleDraw;

            if (isUsingDoubleDraw) {
                if (availableOptions.length < 2) {
                    alert("根据当前过滤条件（或签已被抢光），没有足够的签可以同时抽取两个！");
                    document.getElementById("result").innerText = "无可用签";
                    drawBtn.disabled = false;
                    return;
                }
                // 抽第一个
                const idx1 = Math.floor(Math.random() * availableOptions.length);
                const drawnItem1 = availableOptions[idx1];
                availableOptions.splice(idx1, 1); // 从可用列表中移除已抽出的
                
                // 抽第二个
                const idx2 = Math.floor(Math.random() * availableOptions.length);
                const drawnItem2 = availableOptions[idx2];
                
                drawnName = drawnItem1.name + "&" + drawnItem2.name;
            } else {
                if (availableOptions.length === 0) {
                    alert("根据当前过滤条件（或签已被抢光），没有符合条件的签可以抽取！");
                    document.getElementById("result").innerText = "无可用签";
                    drawBtn.disabled = false;
                    return;
                }
                const randomIndex = Math.floor(Math.random() * availableOptions.length);
                const drawnItem = availableOptions[randomIndex];
                drawnName = drawnItem.name; 
            }

            const { error } = await supabaseClient
                .from('draw_history')
                .insert([{ username: currentUser, draw_name: drawnName }]);

            if (error) {
                console.error("写入抽签记录失败:", error);
                alert("网络错误，抽签结果保存失败，请重试！");
                document.getElementById("result").innerText = "等待中...";
                drawBtn.disabled = false;
                return;
            }

            const newStyle = currentStatus.style || !!activeBanStyle;
            const newPosition = currentStatus.position || !!activeBanPosition;
            // 如果玩家当前或过去曾经用过双抽，保持true，以供历史记录渲染星号使用
            const newDoubleDraw = currentStatus.doubleDraw || isUsingDoubleDraw;
            const newFreeCost = currentStatus.freeCost || activeFreeCost || null; 
            
            if (newStyle !== currentStatus.style || newPosition !== currentStatus.position || newDoubleDraw !== currentStatus.doubleDraw || newFreeCost !== currentStatus.freeCost) {
                const { error: banError } = await supabaseClient
                    .from('user_ban_status')
                    .upsert([{ 
                        username: currentUser, 
                        used_ban_style: newStyle, 
                        used_ban_position: newPosition,
                        used_double_draw: newDoubleDraw,
                        used_free_cost: newFreeCost 
                    }]);
                
                if (!banError) {
                    userBanStatusMap[currentUser] = { style: newStyle, position: newPosition, doubleDraw: newDoubleDraw, freeCost: newFreeCost };
                    updateBanDisplay(); 
                } else {
                    console.error("更新用户状态失败:", banError);
                }
            }

            document.getElementById("result").innerText = drawnName;
            await fetchHistory();
            drawBtn.disabled = false;
        }

        function renderHistory() {
            const listDiv = document.getElementById("history-list");
            listDiv.innerHTML = ""; 

            if (historyRecords.length === 0) {
                listDiv.innerText = "暂无记录";
                return;
            }

            const userDrawsMap = {};
            historyRecords.forEach(record => {
                if (!userDrawsMap[record.user]) {
                    userDrawsMap[record.user] = [];
                }
                userDrawsMap[record.user].push(record.draw);
            });

            for (const user in userDrawsMap) {
                const rowDiv = document.createElement("div");
                rowDiv.className = "history-row";

                const userSpan = document.createElement("span");
                userSpan.className = "history-user";
                
                let htmlContent = user;
                const status = userBanStatusMap[user] || { style: false, position: false, doubleDraw: false, freeCost: null };
                
                // 红色与绿色与橙黄色星号
                if (status.style) {
                    htmlContent += `<span style="color: #c62828; margin-left: 2px;">*</span>`; 
                }
                if (status.position) {
                    htmlContent += `<span style="color: #2e7d32; margin-left: 2px;">*</span>`; 
                }
                if (status.doubleDraw) {
                    htmlContent += `<span style="color: #ff9800; margin-left: 2px;">*</span>`; 
                }
                // 蓝色的数字
                if (status.freeCost) {
                    htmlContent += `<span style="color: #1565c0; font-weight: bold; margin-left: 2px;">${status.freeCost}</span>`;
                }
                
                htmlContent += "：";
                
                userSpan.innerHTML = htmlContent;
                rowDiv.appendChild(userSpan);

                const draws = userDrawsMap[user];
                
                // 记录该玩家是否已经抽到了匹配费用的签
                let freeConditionMet = false; 
                
                // 记录有效抽签数量（不带下划线的，含&也算作1次）
                let validDrawCount = 0; 

                for (let i = 0; i < draws.length; i++) {
                    const drawSpan = document.createElement("span");
                    drawSpan.innerText = draws[i];
                    drawSpan.className = "history-item ";
                    
                    if (i === draws.length - 1) {
                        drawSpan.className += "history-black";
                    } else {
                        drawSpan.className += "history-gray";
                    }

                    // 下划线判断逻辑
                    let shouldUnderline = false;
                    if (status.freeCost) {
                        // 如果条件还没满足（还没抽到过指定cost的签）
                        if (!freeConditionMet) {
                            // 将字符串按 & 切分，只要有一个满足条件，就不划线
                            const singleNames = draws[i].split('&');
                            let hasMatchingCost = false;
                            
                            for (const sName of singleNames) {
                                const charObj = options.find(opt => opt.name === sName);
                                if (charObj && String(charObj.cost) === String(status.freeCost)) {
                                    hasMatchingCost = true;
                                    break;
                                }
                            }
                            
                            if (hasMatchingCost) {
                                freeConditionMet = true;
                            } else {
                                shouldUnderline = true;
                            }
                        }
                    }

                    if (shouldUnderline) {
                        drawSpan.style.textDecoration = "underline";
                    } else {
                        // 如果不带下划线，则计入有效抽签总数（包含&字符串的整体也是1次循环，加1次）
                        validDrawCount++;
                    }

                    rowDiv.appendChild(drawSpan);

                    if (i < draws.length - 1) {
                        const commaNode = document.createTextNode("  ");
                        rowDiv.appendChild(commaNode);
                    }
                }

                // 计算并显示总花费
                const totalCost = Math.pow(2, validDrawCount + 1) - 2;
                const costSpan = document.createElement("span");
                costSpan.style.color = "rgb(255, 0, 0)";
                costSpan.style.marginLeft = "15px";
                costSpan.style.fontSize = "18px";
                costSpan.innerText = `[总花费：${totalCost}]`;
                
                rowDiv.appendChild(costSpan);
                listDiv.appendChild(rowDiv);
            }
        }
    </script>
